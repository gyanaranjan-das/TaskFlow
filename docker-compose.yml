version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskflow-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      CLIENT_URL: http://localhost
    env_file:
      - ./server/.env
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskflow-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo_data:
    name: taskflow-mongo-data
